services:
  postgres:
    image: postgres:16
    container_name: expensetracker-db
    environment:
      POSTGRES_DB: expensetracker
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d expensetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: expensetracker-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/expensetracker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: